<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteTrack | Instant Connect</title>
    <style>
        :root { --bg: #0a0a0c; --panel: #151518; --text: #fff; --spotify: #1DB954; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        .dashboard { background: var(--panel); padding: 30px; border-radius: 12px; max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin-top: 0; font-size: 24px; text-align: center; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 25px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 15px; transition: 0.2s; }
        .btn-spotify { background: var(--spotify); color: black; }
        .btn-spotify:hover { transform: scale(1.02); }
        .input-field { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        #app-interface { display: none; } /* Hidden until logged in */
        .status { text-align: center; font-size: 12px; color: #888; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>RouteTrack</h1>
    
    <div id="login-screen">
        <p class="status">Connect your account to enable the routing engine.</p>
        <button class="btn btn-spotify" onclick="loginWithSpotify()">Connect Spotify</button>
    </div>

    <div id="app-interface">
        <p class="status" style="color: var(--spotify);">✓ Spotify Connected</p>
        
        <label style="font-size: 12px; color: #888;">ROUTE START</label>
        <input type="text" class="input-field" id="start" placeholder="Current Location">
        
        <label style="font-size: 12px; color: #888;">ROUTE DESTINATION</label>
        <input type="text" class="input-field" id="end" placeholder="Destination">

        <button class="btn" style="background: white; color: black;" onclick="simulateSync()">Generate Soundtrack</button>
        
        <div id="output" style="margin-top: 20px; font-size: 12px; color: #aaa; text-align: center;"></div>
    </div>
</div>

<script>
    // --- YOUR UNIQUE IDENTIFIERS GO HERE ---
    const CLIENT_ID = 'PASTE_YOUR_SPOTIFY_CLIENT_ID_HERE'; 
    const REDIRECT_URI = 'PASTE_YOUR_WEBSITE_URL_HERE'; // Where Spotify sends you back after login

    // 1. Check if the user just logged in (Spotify puts the token in the URL)
    window.onload = () => {
        const hash = window.location.hash;
        if (hash) {
            const token = hash.substring(1).split('&').find(elem => elem.startsWith('access_token')).split('=')[1];
            if (token) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-interface').style.display = 'block';
                sessionStorage.setItem('spotifyToken', token); // Save it for this session
                window.location.hash = ''; // Clean up the URL
            }
        }
    };

    // 2. The Login Action
    function loginWithSpotify() {
        if (CLIENT_ID === 'PASTE_YOUR_SPOTIFY_CLIENT_ID_HERE') {
            alert("You must put your Spotify Client ID in the code first!");
            return;
        }
        const authEndpoint = 'https://accounts.spotify.com/authorize';
        const scopes = [ 'playlist-modify-public', 'user-read-private' ];
        window.location = `${authEndpoint}?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&scope=${scopes.join('%20')}&response_type=token&show_dialog=true`;
    }

    // 3. The App Logic Action
    function simulateSync() {
        const token = sessionStorage.getItem('spotifyToken');
        const output = document.getElementById('output');
        output.innerText = "Connecting to Google Maps (Requires API Key)...";
        
        setTimeout(() => {
            output.innerText = `Token recognized. Ready to search Spotify for tracks matching route metrics.`;
        }, 1500);
    }
</script>

</body>
</html>

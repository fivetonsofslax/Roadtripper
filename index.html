<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RouteTrack Pro | Advanced Engine</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB5fTLi4cHs6OaEfqAhd8G1BCrgnp8fSrY&libraries=places"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b; --panel: #18181b; --border: #27272a; --text: #fafafa; --muted: #a1a1aa;
            --spotify: #1DB954; --google: #4285F4; --success: #10b981; --error: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .app-container { max-width: 900px; width: 100%; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        @media (max-width: 800px) { .app-container { grid-template-columns: 1fr; } }

        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 15px; }

        /* Map & Routing */
        #map { width: 100%; height: 400px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--google); }

        /* Sliders */
        .slider-group { margin-bottom: 20px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: var(--border); border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--spotify); border-radius: 50%; cursor: pointer; }

        /* Console & Tracks */
        .console { background: #000; padding: 15px; font-family: monospace; font-size: 11px; color: var(--success); border-radius: 8px; border: 1px solid var(--border); height: 250px; overflow-y: auto; }
        .track-card { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid #222; font-size: 13px; }
        .track-img { width: 40px; height: 40px; border-radius: 4px; background: #333; }
        
        .btn-main { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-google { background: var(--google); color: white; margin-bottom: 10px; }
        .btn-spotify { background: var(--spotify); color: black; }
        .btn-sync { background: white; color: black; margin-top: 10px; }
    </style>
</head>
<body>

<div id="auth-screen" style="width: 100%; max-width: 400px; margin-top: 100px;">
    <h1 style="text-align: center; font-weight: 800;">RouteTrack <span style="color:var(--google)">Pro</span></h1>
    <div class="card">
        <button class="btn-main btn-google" onclick="authGoogle()">Link Google Services</button>
        <button class="btn-main btn-spotify" onclick="authSpotifyPKCE()">Link Spotify Intelligence</button>
    </div>
</div>

<div id="app-screen" class="app-container" style="display: none;">
    <div class="main-engine">
        <div id="map"></div>
        <div class="card">
            <h3>Spatial Parameters</h3>
            <input type="text" id="origin" placeholder="Departure Point">
            <div id="waypoints"></div>
            <button onclick="addWaypoint()" style="background:transparent; border:1px dashed var(--border); color:var(--muted); width:100%; padding:8px; border-radius:8px; cursor:pointer; margin-bottom:10px;">+ Add Waypoint</button>
            <input type="text" id="destination" placeholder="Final Destination">
            <button class="btn-main btn-sync" onclick="runGlobalSync()">Generate Route & Sync</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="card">
            <h3>Acoustic Heuristics</h3>
            
            <label class="slider-label">Genre Seed</label>
            <select id="genre-seed">
                <option value="rock">Rock</option>
                <option value="electronic">Electronic</option>
                <option value="jazz">Jazz</option>
                <option value="classical">Classical</option>
                <option value="hip-hop">Hip Hop</option>
                <option value="techno">Techno / Driving</option>
            </select>

            <div class="slider-group">
                <div class="slider-label"><span>Energy</span><span id="val-energy">High</span></div>
                <input type="range" id="energy" min="0" max="1" step="0.1" value="0.8">
            </div>

            <div class="slider-group">
                <div class="slider-label"><span>Mood (Valence)</span><span id="val-mood">Happy</span></div>
                <input type="range" id="mood" min="0" max="1" step="0.1" value="0.7">
            </div>

            <h3>Reference DNA</h3>
            <input type="text" id="reference-track" placeholder="Example Track (e.g. 'Midnight City')">
            <p style="font-size: 10px; color: var(--muted);">The engine will match tracks to this song's profile.</p>
        </div>

        <div class="console" id="console-output">> Engine Idle. Awaiting Coordinates.</div>
    </div>
</div>

<script>
    // --- 1. CONFIG ---
    const CONFIG = {
        googleClientId: '18315655656-le7l023ktjvj06bffinl5mh5gv2otocc.apps.googleusercontent.com',
        spotifyClientId: 'bb2c459e75c1466a8aea3edbf95c061f',
        redirectUri: window.location.href.split('?')[0].split('#')[0]
    };

    let map, directionsService, directionsRenderer;

    // --- 2. CORE ENGINE LOGIC ---
    async function runGlobalSync() {
        const origin = document.getElementById('origin').value;
        const dest = document.getElementById('destination').value;
        if(!origin || !dest) return alert("Enter start and end points.");

        logToConsole("Mapping spatial route...");
        
        const waypointElements = document.querySelectorAll('#waypoints input');
        const waypoints = Array.from(waypointElements).map(el => ({ location: el.value, stopover: true }));

        directionsService.route({
            origin: origin,
            destination: dest,
            waypoints: waypoints,
            travelMode: 'DRIVING'
        }, async (result, status) => {
            if (status === 'OK') {
                directionsRenderer.setDirections(result);
                const duration = result.routes[0].legs.reduce((acc, leg) => acc + leg.duration.value, 0);
                logToConsole(`Route Acquired: ${Math.round(duration/60)} mins trip time.`);
                await fetchHeuristicMusic();
            } else {
                logToConsole("Spatial Mapping Error: " + status, "var(--error)");
            }
        });
    }

    async function fetchHeuristicMusic() {
        const token = sessionStorage.getItem('spotify_token');
        const genre = document.getElementById('genre-seed').value;
        const energy = document.getElementById('energy').value;
        const mood = document.getElementById('mood').value;
        
        logToConsole(`Analyzing Acoustic Heuristics (E: ${energy}, M: ${mood})...`);

        // URL Endpoint with advanced parameters
        const url = `https://api.spotify.com/v1/recommendations?limit=10&${genre}&target_energy=${energy}&target_valence=${mood}&limit=15`;

        try {
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            
            logToConsole(`Sync Complete: ${data.tracks.length} tracks matched to route.`);
            
            const consoleEl = document.getElementById('console-output');
            data.tracks.forEach(t => {
                consoleEl.innerHTML += `
                    <div class="track-card">
                        <img src="${t.album.images[2].url}" class="track-img">
                        <div>
                            <b>${t.name}</b><br>
                            <span style="color:var(--muted)">${t.artists[0].name}</span>
                        </div>
                    </div>`;
            });
        } catch (e) {
            logToConsole("Acoustic Sync Failed.", "var(--error)");
        }
    }

    // --- 3. UI HELPERS ---
    function logToConsole(msg, color = "var(--success)") {
        const out = document.getElementById('console-output');
        out.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
        out.scrollTop = out.scrollHeight;
    }

    function addWaypoint() {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = "Stopover Point";
        document.getElementById('waypoints').appendChild(input);
        new google.maps.places.Autocomplete(input);
    }

    function initApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'grid';

        map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 53.48, lng: -2.24 },
            zoom: 7,
            disableDefaultUI: true,
            styles: [{ "featureType": "all", "elementType": "labels.text.fill", "stylers": [{ "color": "#ffffff" }] }, { "featureType": "all", "elementType": "labels.text.stroke", "stylers": [{ "color": "#000000" }, { "lightness": 13 }] }, { "featureType": "administrative", "elementType": "geometry.fill", "stylers": [{ "color": "#000000" }] }, { "featureType": "administrative", "elementType": "geometry.stroke", "stylers": [{ "color": "#144b53" }, { "lightness": 14 }, { "weight": 1.4 }] }, { "featureType": "landscape", "elementType": "all", "stylers": [{ "color": "#08304b" }] }, { "featureType": "poi", "elementType": "geometry", "stylers": [{ "color": "#0c4152" }, { "lightness": 5 }] }, { "featureType": "road.highway", "elementType": "geometry.fill", "stylers": [{ "color": "#000000" }] }, { "featureType": "road.highway", "elementType": "geometry.stroke", "stylers": [{ "color": "#0b434f" }, { "lightness": 25 }] }, { "featureType": "road.arterial", "elementType": "geometry.fill", "stylers": [{ "color": "#000000" }] }, { "featureType": "road.arterial", "elementType": "geometry.stroke", "stylers": [{ "color": "#0b3d51" }, { "lightness": 16 }] }, { "featureType": "road.local", "elementType": "geometry", "stylers": [{ "color": "#000000" }] }, { "featureType": "transit", "elementType": "all", "stylers": [{ "color": "#146474" }] }, { "featureType": "water", "elementType": "all", "stylers": [{ "color": "#021019" }] }]
        });

        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ map: map });

        new google.maps.places.Autocomplete(document.getElementById('origin'));
        new google.maps.places.Autocomplete(document.getElementById('destination'));
    }

    // --- 4. AUTH HANDLERS (Omitted details for brevity, use previous logic) ---
    function authGoogle() { window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CONFIG.googleClientId}&redirect_uri=${encodeURIComponent(CONFIG.redirectUri)}&scope=profile%20email&response_type=token&state=google`; }
    async function authSpotifyPKCE() {
        const verifier = Array.from(crypto.getRandomValues(new Uint8Array(32)), x => ('0' + x.toString(16)).slice(-2)).join('');
        sessionStorage.setItem('spotify_verifier', verifier);
        const hashed = await window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
        const challenge = btoa(String.fromCharCode(...new Uint8Array(hashed))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
        window.location.href = `https://accounts.spotify.com/authorize?client_id=${CONFIG.spotifyClientId}&response_type=code&redirect_uri=${encodeURIComponent(CONFIG.redirectUri)}&scope=user-read-private&code_challenge_method=S256&code_challenge=${challenge}`;
    }

    window.onload = async () => {
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        if (hashParams.has('access_token')) sessionStorage.setItem('google_token', hashParams.get('access_token'));
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('code')) {
            const body = new URLSearchParams({ client_id: CONFIG.spotifyClientId, grant_type: 'authorization_code', code: urlParams.get('code'), redirect_uri: CONFIG.redirectUri, code_verifier: sessionStorage.getItem('spotify_verifier') });
            const res = await fetch('https://accounts.spotify.com/api/token', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body });
            const data = await res.json();
            if (data.access_token) sessionStorage.setItem('spotify_token', data.access_token);
        }
        if (sessionStorage.getItem('google_token') && sessionStorage.getItem('spotify_token')) initApp();
    };
</script>
</body>
</html>
